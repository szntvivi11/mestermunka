<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
   <header id="fejlec">
    <div class="header-wave-container">
        <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <defs>
                <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#1a2a4b; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#3399ff; stop-opacity:1" />
                </linearGradient>
            </defs>
            <path fill="rgba(51, 153, 255, 0.2)" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,218.7C960,235,1056,213,1152,186.7C1248,160,1344,128,1392,112L1440,96L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
            <path fill="url(#wave-grad)" d="M0,128L48,138.7C96,149,192,171,288,165.3C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
        </svg>

        <nav id="navigacio">
            <a id="nav-fo" href="/">Főoldal</a>
            <a id="nav-tanfolyamok" href="/tanfolyamok">Tanfolyamok</a>
            <a id="nav-bejelentkezes" href="/bejelentkezes">Bejelentkezés</a>
            <a id="nav-regisztracio" href="/regisztracio">Regisztráció</a>
            <a id="nav-kapcsolat" href="/kapcsolat">Kapcsolat</a>
            <a id="nav-rolunk" href="/rolunk">Rólunk</a>
             <a id="nav-profil" href="/profil">Profil</a>
        </nav>
    </div>
</header>

    <main>
        <div class="aloldal-container">
            <h1>Kapcsolat</h1>
            <form id="contactForm" class="auth-form" style="max-width:400px; display: flex; flex-direction: column;">
                <label for="kapcsolat-nev">Név:</label>
                <input id="kapcsolat-nev" type="text" placeholder="Teljes neved" required>
                
                <label for="kapcsolat-email">Email:</label>
                <input id="kapcsolat-email" type="email" placeholder="email@pelda.hu" required>
                
                <label for="kapcsolat-uzenet">Üzenet:</label>
                <textarea id="kapcsolat-uzenet" rows="5" placeholder="Miben segíthetünk?" required></textarea>
                
                <button type="submit" id="submitBtn" style="padding: 12px; background: #7b2ff2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Küldés</button>
            </form>
            <p id="responseMsg" style="text-align:center; margin-top:15px; font-weight:bold;"></p>
            <p style="text-align:center; margin-top:18px; color:#b185f5;">Elérhetőség: info@tanfolyamok.hu</p>
        </div>
    </main>

    <footer id="footer" style="margin-top: 50px;">
        <div class="footer-container">
            <p>&copy; 2026 Tanfolyamok. Minden jog fenntartva.</p>
        </div>
    </footer>

   <script src="script.js"></script>
</body>
</html>
