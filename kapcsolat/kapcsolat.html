<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <header id="absztrakt-vonal">
        <div style="position: relative; width: 100%; height: 240px;">
            <svg viewBox="0 1 1430 400" width="100%" height="220" preserveAspectRatio="none" style="display:block; position:absolute; top:0; left:0; z-index:1;">
                <defs>
                    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#7b2ff2" />
                        <stop offset="100%" stop-color="#b185f5" />
                    </linearGradient>
                    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#b185f5" />
                        <stop offset="100%" stop-color="#e0c3fc" />
                    </linearGradient>
                </defs>
                <path d="M0,180 C240,120 480,240 720,180 C960,120 1200,240 1440,180 L1440,320 C1200,380 960,100 720,320 C480,540 240,100 0,320 Z" fill="url(#wave1)" fill-opacity="0.85"></path>
                <path d="M0,210 C360,90 1080,330 1440,210 L1440,350 C1200,400 960,180 720,350 C480,520 240,180 0,350 Z" fill="url(#wave2)" fill-opacity="0.65"></path>
            </svg>
            <div style="position:relative; width:100%; height:0; z-index:2;">
                <nav id="navigacio" style="position:absolute; top:120px; left:0; width:100%; display:flex; justify-content:center; gap:24px; font-size:20px; font-weight:600;">
                    <a id="nav-fo" href="/" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; transition: 0.2s all;">Főoldal</a>
                    <a id="nav-tanfolyamok" href="/tanfolyamok" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; transition: 0.2s all;">Tanfolyamok</a>
                    <a id="nav-bejelentkezes" href="/bejelentkezes" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; transition: 0.2s all;">Bejelentkezés</a>
                    <a id="nav-regisztracio" href="/regisztracio" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; transition: 0.2s all;">Regisztráció</a>
                    <a id="nav-kapcsolat" href="/kapcsolat" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; transition: 0.2s all;">Kapcsolat</a>
                    <a id="nav-profil" href="/profil" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; transition: 0.2s all;">Profil</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="aloldal-container">
            <h1>Kapcsolat</h1>
            <form id="contactForm" class="auth-form" style="max-width:400px; display: flex; flex-direction: column;">
                <label for="kapcsolat-nev">Név:</label>
                <input id="kapcsolat-nev" type="text" placeholder="Teljes neved" required>
                
                <label for="kapcsolat-email">Email:</label>
                <input id="kapcsolat-email" type="email" placeholder="email@pelda.hu" required>
                
                <label for="kapcsolat-uzenet">Üzenet:</label>
                <textarea id="kapcsolat-uzenet" rows="5" placeholder="Miben segíthetünk?" required></textarea>
                
                <button type="submit" id="submitBtn" style="padding: 12px; background: #7b2ff2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Küldés</button>
            </form>
            <p id="responseMsg" style="text-align:center; margin-top:15px; font-weight:bold;"></p>
            <p style="text-align:center; margin-top:18px; color:#b185f5;">Elérhetőség: info@tanfolyamok.hu</p>
        </div>
    </main>

    <footer id="footer" style="margin-top: 50px;">
        <div class="footer-container">
            <p>&copy; 2026 Tanfolyamok. Minden jog fenntartva.</p>
        </div>
    </footer>

   <script src="script.js"></script>
</body>
</html>
