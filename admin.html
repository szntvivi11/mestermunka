<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Üzenetek</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .admin-container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .admin-table-wrapper { background: rgba(40, 40, 90, 0.3); border-radius: 15px; padding: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(177, 133, 245, 0.2); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; color: #fff; }
        th { background: rgba(123, 47, 242, 0.6); padding: 15px; text-align: left; border-bottom: 2px solid #7b2ff2; font-weight: bold; }
        td { padding: 15px; border-bottom: 1px solid rgba(177, 133, 245, 0.3); vertical-align: middle; text-align: left; }
        tr:hover { background: rgba(255, 255, 255, 0.05); }
        .btn-container { display: flex; justify-content: flex-start; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: white; transition: all 0.2s ease; text-decoration: none; display: inline-flex; align-items: center; font-size: 14px; }
        .reply-btn { background: #4CAF50; color: white; margin-right: 5px; }
        .reply-btn:hover { background: #45a049; }
        .delete-btn { background: #f22f2f; color: white; }
        .delete-btn:hover { background: #d32f2f; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a2e; margin: 10% auto; padding: 30px; border: 1px solid #7b2ff2; width: 500px; border-radius: 15px; box-shadow: 0 0 20px rgba(123, 47, 242, 0.5); }
        .modal-content h2 { color: #b185f5; margin-top: 0; }
        .modal-content textarea { width: 100%; height: 150px; background: #28285a; color: white; border: 1px solid #b185f5; padding: 12px; border-radius: 8px; margin: 15px 0; resize: vertical; }
        .nav-buttons { margin-bottom: 30px; display: flex; gap: 15px; align-items: center; }
        .btn-back { background: #2a2d3e; border: 1px solid #444; }
        .btn-back:hover { background: #363a50; border-color: #666; }
        .btn-messages { background: #7b2ff2; box-shadow: 0 4px 12px rgba(123, 47, 242, 0.3); }
        .btn-messages:hover { background: #8a46f5; transform: translateY(-2px); }
        .loading { text-align: center; padding: 40px; color: #b185f5; font-size: 1.2em; }
        .error-msg { text-align: center; padding: 40px; color: #ff4d4d; }

        @media (max-width: 768px) {
            .admin-table-wrapper { overflow-x: visible; padding: 15px; }
            table { display: block; width: 100%; }
            thead { display: none; }
            tbody tr { display: block; margin-bottom: 15px; border: 1px solid rgba(177, 133, 245, 0.2); border-radius: 10px; padding: 10px; background: rgba(40, 40, 90, 0.3); }
            tbody tr td { display: flex; justify-content: space-between; padding: 10px; border: none; border-bottom: 1px solid rgba(177, 133, 245, 0.1); }
            tbody tr td:last-child { border-bottom: none; }
            tbody tr td::before { content: attr(data-label); font-weight: bold; color: #b185f5; margin-right: 10px; }
            .btn.reply-btn, .btn.delete-btn { margin: 5px 0; width: 100%; padding: 10px; font-size: 0.9em; border-radius: 5px; }
            .modal-content { width: 90%; margin: 20% auto; }
            .admin-container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-container">
            <div class="nav-buttons">
                <a href="/profil" class="btn btn-back">⬅ Vissza a profilhoz</a>
                <a href="/admin_full.html" class="btn btn-messages">🛠️ Rendszerfelügyelet</a>
            </div>

            <h1 style="text-align: center; margin-bottom: 30px; color: #b185f5;">📧 Beérkezett Üzenetek</h1>

            <div class="admin-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Dátum</th>
                            <th>Név</th>
                            <th>Email</th>
                            <th>Üzenet</th>
                            <th>Műveletek</th>
                        </tr>
                    </thead>
                    <tbody id="uzenetek-table">
                        <tr><td colspan="5" class="loading">⏳ Betöltés...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="replyModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Válasz küldése</h2>
            <input type="hidden" id="replyEmail">
            <input type="hidden" id="replyNev">
            <textarea id="replyText" placeholder="Írd ide a választ a felhasználónak..."></textarea>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn" style="background: #555;" onclick="document.getElementById('replyModal').style.display='none'">Mégse</button>
                <button class="btn reply-btn" onclick="valaszKuldese()">Válasz elküldése</button>
            </div>
        </div>
    </div>

    <script>
        // Admin ellenőrzés
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== "admin") {
            alert("Hozzáférés megtagadva!");
            window.location.href = "/bejelentkezes";
        }

        async function uzenetekBetoltese() {
            const table = document.getElementById('uzenetek-table');
            try {
                const res = await fetch('/api/admin/uzenetek');
                if (!res.ok) throw new Error(`HTTP hiba: ${res.status}`);
                const data = await res.json();

                if (!data || data.length === 0) {
                    table.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#aaa;">Nincsenek üzenetek.</td></tr>';
                    return;
                }

                table.innerHTML = data.map(u => {
                    const datum = new Date(u.datum).toLocaleString('hu-HU');
                    // Idézőjel escape-elés onclick-ben
                    const emailEsc = u.email.replace(/'/g, "\\'");
                    const nevEsc = u.nev.replace(/'/g, "\\'");
                    return `
                        <tr>
                            <td style="font-size:0.8em; color:#b185f5;" data-label="Dátum">${datum}</td>
                            <td data-label="Név"><b>${u.nev}</b></td>
                            <td data-label="Email"><a href="mailto:${u.email}" style="color:#fff;">${u.email}</a></td>
                            <td data-label="Üzenet" style="max-width:300px;">${u.uzenet}</td>
                            <td data-label="Műveletek">
                                <div class="btn-container">
                                    <button class="btn reply-btn" onclick="valaszAblak('${emailEsc}', '${nevEsc}')">Válasz</button>
                                    <button class="btn delete-btn" onclick="torles(${u.id})">Törlés</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error("Hiba az üzenetek betöltésekor:", err);
                table.innerHTML = `<tr><td colspan="5" class="error-msg">❌ Nem sikerült betölteni az üzeneteket. (${err.message})</td></tr>`;
            }
        }

        function valaszAblak(email, nev) {
            document.getElementById('replyModal').style.display = 'block';
            document.getElementById('modalTitle').textContent = `Válasz: ${nev} (${email})`;
            document.getElementById('replyEmail').value = email;
            document.getElementById('replyNev').value = nev;
            document.getElementById('replyText').value = '';
        }

        async function valaszKuldese() {
            const email = document.getElementById('replyEmail').value;
            const nev = document.getElementById('replyNev').value;
            const uzenet = document.getElementById('replyText').value;
            if (!uzenet.trim()) return alert("Az üzenet nem lehet üres!");

            const kuldesBtn = document.querySelector('#replyModal .reply-btn');
            kuldesBtn.textContent = '⏳ Küldés...';
            kuldesBtn.disabled = true;

            try {
                const res = await fetch('/api/admin/valasz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, nev, uzenet })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    alert(`✅ Válasz sikeresen elküldve ide: ${email}`);
                    document.getElementById('replyModal').style.display = 'none';
                    document.getElementById('replyText').value = '';
                } else {
                    alert("❌ Hiba: " + (data.message || "Ismeretlen hiba"));
                }
            } catch (err) {
                alert("❌ Szerverhiba: " + err.message);
            } finally {
                kuldesBtn.textContent = 'Válasz elküldése';
                kuldesBtn.disabled = false;
            }
        }

        async function torles(id) {
            if (!confirm("Biztosan törlöd ezt az üzenetet?")) return;
            try {
                const res = await fetch(`/api/admin/uzenetek/${id}`, { method: 'DELETE' });
                if (res.ok) uzenetekBetoltese();
                else alert("Törlés sikertelen!");
            } catch (err) {
                alert("Szerverhiba: " + err.message);
            }
        }

        // Modal bezárása háttérre kattintva
        document.getElementById('replyModal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        uzenetekBetoltese();
    </script>
</body>
</html>
