<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanfolyamok</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Fejléc és navigációs sáv -->
    <header id="fejlec">
        <div id="absztrakt-vonal">
		<div style="position: relative; width: 100%; height: 240px;">
			<svg viewBox="0 0 1440 400" width="100%" height="220" preserveAspectRatio="none" style="display:block; position:absolute; top:0; left:0; z-index:1;">
				<defs>
					<linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
						<stop offset="80%" stop-color="#fff" stop-opacity="0" />
						<stop offset="100%" stop-color="#fff" stop-opacity="0.7" />
					</linearGradient>
					
					<linearGradient id="absztrakt-stripes" x1="0" y1="0" x2="1" y2="0">
						<stop offset="0%" stop-color="#f22f2f" />
						<stop offset="60%" stop-color="#8b0000" />
						<stop offset="100%" stop-color="#000000" />
					</linearGradient>
					<linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
						<stop offset="0%" stop-color="#7b2ff2" />
						<stop offset="100%" stop-color="#b185f5" />
					</linearGradient>
					<linearGradient id="wave2" x1="0" y1="0" x2="1" y2="1">
						<stop offset="0%" stop-color="#b185f5" />
						<stop offset="100%" stop-color="#e0c3fc" />
					</linearGradient>
				</defs>
				<path d="M0,180 C240,120 480,240 720,180 C960,120 1200,240 1440,180 L1440,320 C1200,380 960,100 720,320 C480,540 240,100 0,320 Z" fill="url(#wave1)" fill-opacity="0.85"></path>
				<path d="M0,210 C360,90 1080,330 1440,210 L1440,350 C1200,400 960,180 720,350 C480,520 240,180 0,350 Z" fill="url(#wave2)" fill-opacity="0.65"></path>
			</svg>
			<div style="position:relative; width:100%; height:0; z-index:2;">
    <nav id="navigacio" style="position:absolute; top:120px; left:0; width:100%; display:flex; justify-content:center; gap:24px; font-size:20px; font-weight:600;">
        <a id="nav-fo" href="/" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Főoldal</a>
        <a id="nav-tanfolyamok" href="/tanfolyamok" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Tanfolyamok</a>
        <a id="nav-bejelentkezes" href="/bejelentkezes" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Bejelentkezés</a>
        <a id="nav-regisztracio" href="/regisztracio" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Regisztráció</a>
        <a id="nav-kapcsolat" href="/kapcsolat" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Kapcsolat</a>
    </nav>
</div>

			<!-- tükrözött, elmosott reflektív SVG eltávolítva: csak a fő hullámok maradnak -->
		</div>
	</div>
    </header>

    <!-- Fő tartalom -->
    <main>
        <section id="udvozlo">
            <h1>Üdvözlünk a Tanfolyamok oldalán!</h1>
            <p>Válassz a különböző tanfolyamaink közül, és fejleszd tudásod!</p>
           
        </section>
    </main>

    <!-- Lábjegyzet -->
    <footer id="footer">
    <div class="footer-container">
        <p>&copy; 2025 MyWebsite. Minden jog fenntartva.</p>
            <nav class="footer-nav">
            <a href="/">Főoldal</a>
            <a href="/tanfolyamok">Tanfolyamok</a>
            <a href="/kapcsolat">Kapcsolat</a>
            <a href="/bejelentkezes">Bejelentkezés</a>
        </nav>
    </div>
</footer>

    <!-- No site-wide script found in root; keep footer script reference minimal or add scripts as needed -->
    <script>
            // Check user role and update navigation dynamically
            document.addEventListener('DOMContentLoaded', () => {
                const nav = document.getElementById('navigacio');
                const navLogin = document.getElementById('nav-bejelentkezes');
                const navRegister = document.getElementById('nav-regisztracio');

                const user = JSON.parse(localStorage.getItem('user'));
                console.log('User data:', user); // Debug log to check user data

                if (user) {
                    // Remove login and registration links
                    navLogin?.remove();
                    navRegister?.remove();

                    // Add profile link
                    const profileLink = document.createElement('a');
                    profileLink.id = 'nav-profil';
                    profileLink.href = '/profil';
                    profileLink.textContent = 'Profil';
                    profileLink.style = navLogin.style.cssText;
                    nav.appendChild(profileLink);

                    // Add course upload link for teachers
                    if (user.role === 'teacher') {
                        const uploadLink = document.createElement('a');
                        uploadLink.id = 'nav-tanfolyamfeltoltes';
                        uploadLink.href = '/tanfolyamfeltoltes';
                        uploadLink.textContent = 'Tanfolyamfeltöltés';
                        uploadLink.style = navLogin.style.cssText;
                        nav.appendChild(uploadLink);
                    }
                }
            });
        </script>
</body>
</html>
