<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Üzenetek</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <div class="container">
        <div class="admin-container">
            <div class="nav-buttons">
                <a href="/profil" class="btn btn-back">Vissza a profilhoz</a>
                <a href="/admin_full.html" class="btn btn-messages">Rendszerfelügyelet</a>
            </div>

            <h1 style="text-align: center; margin-bottom: 30px; color: #b185f5;">Beérkezett Üzenetek</h1>

            <div class="admin-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Dátum</th>
                            <th>Név</th>
                            <th>Email</th>
                            <th>Üzenet</th>
                            <th>Műveletek</th>
                        </tr>
                    </thead>
                    <tbody id="uzenetek-table">
                        <tr><td colspan="5" class="loading">Betöltés...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="replyModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Válasz küldése</h2>
            <input type="hidden" id="replyEmail">
            <input type="hidden" id="replyNev">
            <textarea id="replyText" placeholder="Írd ide a választ a felhasználónak..."></textarea>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn" onclick="document.getElementById('replyModal').style.display='none'">Mégse</button>
                <button class="btn reply-btn" onclick="valaszKuldese()">Válasz elküldése</button>
            </div>
        </div>
    </div>

    <script src="/admin/admin.js"></script>
</body>
</html>
