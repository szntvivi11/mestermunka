<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="absztrakt-vonal">
        <div style="position: relative; width: 100%; height: 240px;">
            <svg viewBox="0 0 1440 400" width="100%" height="220" preserveAspectRatio="none" style="display:block; position:absolute; top:0; left:0; z-index:1;">
                <defs>
                    <linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="80%" stop-color="#fff" stop-opacity="0" />
                        <stop offset="100%" stop-color="#fff" stop-opacity="0.7" />
                    </linearGradient>
                    <linearGradient id="absztrakt-stripes" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#f22f2f" />
                        <stop offset="60%" stop-color="#8b0000" />
                        <stop offset="100%" stop-color="#000000" />
                    </linearGradient>
                    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#7b2ff2" />
                        <stop offset="100%" stop-color="#b185f5" />
                    </linearGradient>
                    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#b185f5" />
                        <stop offset="100%" stop-color="#e0c3fc" />
                    </linearGradient>
                </defs>
                <path d="M0,180 C240,120 480,240 720,180 C960,120 1200,240 1440,180 L1440,320 C1200,380 960,100 720,320 C480,540 240,100 0,320 Z" fill="url(#wave1)" fill-opacity="0.85"></path>
                <path d="M0,210 C360,90 1080,330 1440,210 L1440,350 C1200,400 960,180 720,350 C480,520 240,180 0,350 Z" fill="url(#wave2)" fill-opacity="0.65"></path>
            </svg>
            <div style="position:relative; width:100%; height:0; z-index:2;">
                <nav id="navigacio" style="position:absolute; top:120px; left:0; width:100%; display:flex; justify-content:center; gap:20px;">
                    <a id="nav-fo" href="index.html">Főoldal</a>
                    <a id="nav-tanfolyamok" href="tanfolyamok.html">Tanfolyamok</a>
                    <a id="nav-bejelentkezes" href="bejelentkezes.html">Bejelentkezés</a>
                    <a id="nav-regisztracio" href="regisztracio.html" class="active">Regisztráció</a>
                    <a id="nav-kapcsolat" href="kapcsolat.html">Kapcsolat</a>
                </nav>
            </div>
			<!-- tükrözött, elmosott reflektív SVG eltávolítva: csak a fő hullámok maradnak -->
        </div>
    </div>
    <main>
  <div class="aloldal-container">
    <h1>Regisztráció</h1>

    <!-- Fülek -->
    <div class="tabs">
  <button id="user-tab" class="tab active">Felhasználó</button>
  <button id="teacher-tab" class="tab">Tanfolyam adó</button>
</div>


    <!-- Felhasználói regisztráció -->
    <form id="user-form" class="auth-form active">
      <label for="reg-username">Felhasználónév:</label>
      <input id="reg-username" type="text" required>

      <label for="reg-email">Email:</label>
      <input id="reg-email" type="email" required>

      <label for="reg-password">Jelszó:</label>
      <input id="reg-password" type="password" required>

      <button type="submit">Regisztráció</button>
    </form>

    <!-- Tanfolyam adó regisztráció -->
    <form id="teacher-form" class="auth-form">
      <label for="teacher-name">Név:</label>
      <input id="teacher-name" type="text" required>

      <label for="teacher-email">Email:</label>
      <input id="teacher-email" type="email" required>

      <label for="teacher-password">Jelszó:</label>
      <input id="teacher-password" type="password" required>

      <label for="teacher-course">Tanfolyam neve:</label>
      <input id="teacher-course" type="text" required placeholder="Pl. Webfejlesztés alapjai">

      <label for="teacher-desc">Tanfolyam leírása:</label>
      <textarea id="teacher-desc" rows="4" placeholder="Írj pár mondatot a tanfolyamról..." required></textarea>

      <button type="submit">Regisztráció</button>
    </form>

    <p style="text-align:center; margin-top:18px;">Van már fiókod? <a href="bejelentkezes.html">Lépj be!</a></p>
  </div>
</main>

</body>
<script src="regisztracio.js"></script>
</html>
