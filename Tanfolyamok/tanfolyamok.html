<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanfolyamok</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<style>
    #pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin: 40px 0;
        font-family: sans-serif;
    }
.pagination-btn {
        background: rgba(123, 47, 242, 0.2);
        border: 1px solid #7b2ff2;
        color: white;
        width: 45px;
        height: 45px;
        border-radius: 50%; /* Teljesen kerek */
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 14px; /* Kisebb nyilak */
    }

.pagination-btn:disabled {
        border-color: #444;
        color: #666;
        cursor: not-allowed;
        opacity: 0.5;
    }

    .pagination-btn:hover:not(:disabled) {
        background: #7b2ff2;
        box-shadow: 0 0 15px rgba(123, 47, 242, 0.5);
        transform: translateY(-2px);
    }
.page-info {
        color: #b185f5;
        font-weight: 600;
        letter-spacing: 1px;
        background: rgba(255,255,255,0.05);
        padding: 5px 15px;
        border-radius: 20px;}
</style>
<body>
   
<header id="fejlec">
        <!-- DESKTOP: hullám -->
        <div class="header-wave-container desktop-wave">
            <div class="logo-container">
                <a href="/"><img src="./kepek/logooo.png" alt="Logo" class="header-logo"></a>
            </div>
            <a href="/profil" class="mini-profil-link" id="miniProfilLink" style="display:none;">
                <img id="headerProfileImage" src="https://ui-avatars.com/api/?name=User&size=50&background=242440&color=3399ff&bold=true" alt="Profil">
            </a>
            <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#1a2a4b; stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#3399ff; stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path fill="rgba(51, 153, 255, 0.2)" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,218.7C960,235,1056,213,1152,186.7C1248,160,1344,128,1392,112L1440,96L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
                <path fill="url(#wave-grad)" d="M0,128L48,138.7C96,149,192,171,288,165.3C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
            </svg>
            <nav id="navigacio">
                <a id="nav-fo" href="/">Főoldal</a>
                <a id="nav-tanfolyamok" href="/tanfolyamok">Tanfolyamok</a>
                <a id="nav-bejelentkezes" href="/bejelentkezes">Bejelentkezés</a>
                <a id="nav-regisztracio" href="/regisztracio">Regisztráció</a>
                <a id="nav-kapcsolat" href="/kapcsolat">Kapcsolat</a>
                <a id="nav-rolunk" href="/rolunk">Rólunk</a>
            </nav>
        </div>

        <!-- MOBIL: gradient csík -->
        <div class="mobile-header">
            <button class="hamburger" id="hamburgerBtn" aria-label="Menü">
                <span></span><span></span><span></span>
            </button>
            <a href="/" class="mobile-logo">
                <img src="./kepek/logooo.png" alt="Logo">
            </a>
            <a href="/profil" class="mini-profil-link mobile-profil" id="miniProfilLinkMobile" style="display:none;">
                <img id="headerProfileImageMobile" src="https://ui-avatars.com/api/?name=User&size=50&background=242440&color=3399ff&bold=true" alt="Profil">
            </a>
            <div class="mobile-profil-placeholder" id="mobileProfilPlaceholder"></div>
        </div>

        <!-- MOBIL: lenyíló menü -->
        <div class="mobile-nav-drawer" id="mobileNavDrawer">
            <a href="/">Főoldal</a>
            <a href="/tanfolyamok">Tanfolyamok</a>
            <a id="nav-bejelentkezes-m" href="/bejelentkezes">Bejelentkezés</a>
            <a id="nav-regisztracio-m" href="/regisztracio">Regisztráció</a>
            <a href="/kapcsolat">Kapcsolat</a>
            <a href="/rolunk">Rólunk</a>
        </div>
    </header>

<main id="tanfolyamokmain">
    <h1 style="top: -100;">Tanfolyamok</h1>

    <div class="search-container" style="position: relative; max-width: 400px; margin: 20px auto;">
        
        <input type="text" id="courseSearch" placeholder="Keress tanfolyam neve alapján...">
    </div>

    <div id="tanfolyamokcards" class="tanfolyamkartya-container"></div>

    <div id="modal">
        <div id="modal-content">
            <button id="closeModal">&times;</button>
            <img id="modalImage" src="" alt="Tanfolyam képe">
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
            <p><strong>Ár:</strong> <span id="modalPrice"></span></p>
            <p><strong>Email:</strong> <span id="modalEmail"></span></p>
            <p><strong>Korhatár:</strong> <span id="modalAge"></span></p>
            <p><strong>Helyszín:</strong> <span id="modalLocation"></span></p>
            <button id="applyButton">Jelentkezés</button>
        </div>
    </div>
</main>

<footer id="footer">
    <div class="footer-container">
        <p>&copy; 
            BGSZC Pestszentlőrinci Technikum | Mestermunka 2026</p>
            <nav class="footer-nav">
            <a href="/">Főoldal</a>
            <a href="/tanfolyamok">Tanfolyamok</a>
            <a href="/kapcsolat">Kapcsolat</a>
            <a href="/bejelentkezes">Bejelentkezés</a>
        </nav>
    </div>
</footer>

<script>
    // Hamburger menü
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileNavDrawer = document.getElementById('mobileNavDrawer');
    hamburgerBtn.addEventListener('click', () => {
        hamburgerBtn.classList.toggle('open');
        mobileNavDrawer.classList.toggle('open');
    });
    mobileNavDrawer.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            hamburgerBtn.classList.remove('open');
            mobileNavDrawer.classList.remove('open');
        });
    });

async function updateHeaderProfile() {
    const storedUser = JSON.parse(localStorage.getItem('user'));
    if (storedUser && storedUser.id) {
        try {
            const response = await fetch(`/api/profile?id=${storedUser.id}&role=${storedUser.role}`);
            const data = await response.json();
            if (data.success) {
                const user = data.user;
                const getImgSrc = (profilkep, nev, felhasznalonev) => {
                    if (profilkep) return profilkep.startsWith('/') ? profilkep : `/Tanfolyamok/kepek/${profilkep}`;
                    return `https://ui-avatars.com/api/?name=${encodeURIComponent(nev || felhasznalonev || 'User')}&size=50&background=242440&color=3399ff&bold=true`;
                };
                const imgSrc = getImgSrc(user.profilkep, user.nev, user.felhasznalonev);

                const miniProfilLink = document.getElementById('miniProfilLink');
                const headerImg = document.getElementById('headerProfileImage');
                if (miniProfilLink) miniProfilLink.style.display = 'block';
                if (headerImg) headerImg.src = imgSrc;

                const miniProfilLinkMobile = document.getElementById('miniProfilLinkMobile');
                const headerImgMobile = document.getElementById('headerProfileImageMobile');
                const placeholder = document.getElementById('mobileProfilPlaceholder');
                if (miniProfilLinkMobile) miniProfilLinkMobile.style.display = 'flex';
                if (headerImgMobile) headerImgMobile.src = imgSrc;
                if (placeholder) placeholder.style.display = 'none';

                ['nav-bejelentkezes','nav-regisztracio','nav-bejelentkezes-m','nav-regisztracio-m'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.style.display = 'none';
                });
            }
        } catch (err) { console.error(err); }
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    await updateHeaderProfile();

    const container = document.getElementById('tanfolyamokcards');
    const searchInput = document.getElementById('courseSearch');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');
    
    let allCourses = [];
    let filteredCourses = [];
    let currentPage = 1;
    const coursesPerPage = 12;

    const paginationContainer = document.createElement('div');
    paginationContainer.id = 'pagination';
    paginationContainer.style.cssText = 'display:flex; justify-content:center; align-items:center; gap:20px; margin: 30px 0; font-size:18px; color: white;';
    container.after(paginationContainer);

    try {
        const res = await fetch('/api/kepzesek');
        if (!res.ok) throw new Error('Hiba a lekéréskor');
        allCourses = await res.json();
        filteredCourses = [...allCourses];
        renderCourses();
    } catch (err) {
        console.error('Hiba a tanfolyamok betöltésekor:', err);
        container.innerHTML = '<p>Nem sikerült betölteni a tanfolyamokat.</p>';
    }

    function renderCourses() {
        container.innerHTML = '';
        const startIndex = (currentPage - 1) * coursesPerPage;
        const endIndex = startIndex + coursesPerPage;
        const currentItems = filteredCourses.slice(startIndex, endIndex);

        if (currentItems.length === 0) {
            container.innerHTML = '<p>Nincs találat.</p>';
            paginationContainer.innerHTML = '';
            return;
        }

        currentItems.forEach(course => {
            const card = document.createElement('div');
            card.className = 'tanfolyamkartya';
            card.innerHTML = `
                <img src="/tanfolyamok/kepek/${course.kep}" alt="${course.nev}">
                <h2>${course.nev}</h2>
            `;
            card.addEventListener('click', () => {
                document.getElementById('modalTitle').textContent = course.nev;
                document.getElementById('modalTitle').dataset.courseId = course.id;
                document.getElementById('modalDescription').textContent = course.leiras;
                document.getElementById('modalPrice').textContent = course.ar + " Ft";
                document.getElementById('modalEmail').textContent = course.email;
                document.getElementById('modalAge').textContent = course.heves_kortol + "+ év";
                document.getElementById('modalLocation').textContent = course.helyileg;
                document.getElementById('modalImage').src = `/tanfolyamok/kepek/${course.kep}`;
                modal.style.display = 'flex';
            });
            container.appendChild(card);
        });
        renderPaginationControls();
    }

    function renderPaginationControls() {
        paginationContainer.innerHTML = '';
        const totalPages = Math.ceil(filteredCourses.length / coursesPerPage);
        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
        prevBtn.className = 'pagination-btn';
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => { currentPage--; renderCourses(); document.getElementById('tanfolyamokmain').scrollIntoView({ behavior: 'smooth' }); };

        const pageInfo = document.createElement('span');
        pageInfo.className = 'page-info';
        pageInfo.textContent = `${currentPage} / ${totalPages}`;

        const nextBtn = document.createElement('button');
        nextBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
        nextBtn.className = 'pagination-btn';
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => { currentPage++; renderCourses(); document.getElementById('tanfolyamokmain').scrollIntoView({ behavior: 'smooth' }); };

        paginationContainer.append(prevBtn, pageInfo, nextBtn);
    }

    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        filteredCourses = allCourses.filter(course => course.nev.toLowerCase().includes(searchTerm));
        currentPage = 1;
        renderCourses();
    });

    closeModal.addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });

    document.getElementById('applyButton').addEventListener('click', async () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) { alert('Jelentkezéshez be kell jelentkezni!'); return; }
        const courseId = parseInt(document.getElementById('modalTitle').dataset.courseId);
        try {
            const res = await fetch('/api/jelentkezes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.id, kepzesId: courseId })
            });
            if (res.ok) { alert('Sikeres jelentkezés!'); modal.style.display = 'none'; }
            else { const data = await res.json(); alert(data.message || 'Hiba történt'); }
        } catch (err) { alert('Szerverhiba történt a jelentkezéskor.'); }
    });
});
</script>
</body>
</html>
