                <a id="nav-kapcsolat" href="/kapcsolat" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Kapcsolat</a>

    <script src="script.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('tanfolyamokcards');
        try {
            const response = await fetch('/api/kepzesek');
            const courses = await response.json();
 
            container.innerHTML = '';
            courses.forEach(course => {
                const card = document.createElement('a');
                card.className = 'tanfolyamkartya';
                card.href = `../Tanfolyamok/oldalak/${course.nev.toLowerCase().replace(/ /g, '-')}.html`;
                card.style = `
                    text-decoration:none; color:#fff; background:rgba(0,0,0,0.6);
                    border:2px solid #33f; border-radius:12px;
                    box-shadow:0 2px 8px rgba(51,153,255,0.25);
                    width:260px; padding:18px; display:flex;
                    flex-direction:column; align-items:center;`;
 
                card.innerHTML = `
                    <img src="kepek/${course.kep}" alt="${course.nev}"
                         style="width:100%; max-width:200px; border-radius:8px; margin-bottom:12px;">
                    <h2>${course.nev}</h2>
                `;
 
                container.appendChild(card);
            });
        } catch (error) {
            console.error('Hiba a tanfolyamok betöltésekor:', error);
            container.innerHTML = '<p>Nem sikerült betölteni a tanfolyamokat.</p>';
        }
    });
</script>
<script>
            // Check if the user is logged in and hide the login/register links
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                const loginNav = document.getElementById('nav-bejelentkezes');
                const registerNav = document.getElementById('nav-regisztracio');
                if (loginNav) loginNav.style.display = 'none';
                if (registerNav) registerNav.style.display = 'none';
            }
        </script>
</body>
