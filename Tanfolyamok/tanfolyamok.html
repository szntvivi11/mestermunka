<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanfolyamok</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Üdvözlünk a tanfolyamok oldalán!</h1><img src="Tanfolyamok/kepek/logo.png" alt="Logo" style="position: absolute; top: 10px; left: 10px; width: 100px; height: auto; z-index: 3; cursor: pointer;" onclick="window.location.href='/'">
<header id="absztrakt-vonal">
    <div style="position: relative; width: 100%; height: 240px;">
        <svg viewBox="0 0 1440 400" width="100%" height="220" preserveAspectRatio="none" style="display:block; position:absolute; top:0; left:0; z-index:1;">
            <defs>
                <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#7b2ff2" />
                    <stop offset="100%" stop-color="#b185f5" />
                </linearGradient>
                <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#b185f5" />
                    <stop offset="100%" stop-color="#e0c3fc" />
                </linearGradient>
            </defs>
            <path d="M0,180 C240,120 480,240 720,180 C960,120 1200,240 1440,180 L1440,320 C1200,380 960,100 720,320 C480,540 240,100 0,320 Z" fill="url(#wave1)" fill-opacity="0.85"></path>
            <path d="M0,210 C360,90 1080,330 1440,210 L1440,350 C1200,400 960,180 720,350 C480,520 240,180 0,350 Z" fill="url(#wave2)" fill-opacity="0.65"></path>
        </svg>
        <nav id="navigacio" style="position:absolute; top:120px; left:0; width:100%; display:flex; justify-content:center; gap:24px; font-size:20px; font-weight:600;">
            <a id="nav-fo" href="/" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5);
             text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Főoldal</a>
            <a id="nav-tanfolyamok" href="/tanfolyamok" style="color:#fff; padding:14px 24px; border-radius:10px;
             background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Tanfolyamok</a>
            <a id="nav-bejelentkezes" href="/bejelentkezes" style="color:#fff; padding:14px 24px; border-radius:10px; 
            background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Bejelentkezés</a>
            <a id="nav-regisztracio" href="/regisztracio" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5);
             text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Regisztráció</a>
            <a id="nav-kapcsolat" href="/kapcsolat" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5);
             text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Kapcsolat</a>
            
    
        </nav>
    </div>
</header>

<main id="tanfolyamokmain">
    <h1>Tanfolyamok</h1>
    <div id="tanfolyamokcards" class="tanfolyamkartya-container"></div>

    <!-- Modal -->
    <div id="modal">
        <div id="modal-content">
            <button id="closeModal">&times;</button>
            <img id="modalImage" src="" alt="Tanfolyam képe">
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
            <p><strong>Ár:</strong> <span id="modalPrice"></span></p>
            <p><strong>Email:</strong> <span id="modalEmail"></span></p>
            <p><strong>Korhatár:</strong> <span id="modalAge"></span></p>
            <p><strong>Helyszín:</strong> <span id="modalLocation"></span></p>
            <button id="applyButton">Jelentkezés</button>
        </div>
    </div>
</main>

<footer id="footer">
    <div class="footer-container">
        <p>&copy; 2026 Tanfolyamok</p>
        <div class="footer-nav">
            <a href="/">Főoldal</a>
            <a href="/kapcsolat">Kapcsolat</a>
            <a href="/profil">Profil</a>
        </div>
    </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const container = document.getElementById('tanfolyamokcards');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalDescription = document.getElementById('modalDescription');
    const modalPrice = document.getElementById('modalPrice');
    const modalEmail = document.getElementById('modalEmail');
    const modalAge = document.getElementById('modalAge');
    const modalLocation = document.getElementById('modalLocation');
    const modalImage = document.getElementById('modalImage');
    const applyButton = document.getElementById('applyButton');

    // Betöltjük a tanfolyamokat
    try {
        const res = await fetch('/api/kepzesek');
        if (!res.ok) throw new Error('Hiba a lekéréskor');
        const courses = await res.json();

        container.innerHTML = '';
        courses.forEach(course => {
            const card = document.createElement('div');
            card.className = 'tanfolyamkartya';
            card.innerHTML = `
                <img src="/tanfolyamok/kepek/${course.kep}" alt="${course.nev}">
                <h2>${course.nev}</h2>
            `;

            card.addEventListener('click', () => {
                modalTitle.textContent = course.nev;
                modalTitle.dataset.courseId = course.id;
                modalDescription.textContent = course.leiras;
                modalPrice.textContent = course.ár;
                modalEmail.textContent = course.email;
                modalAge.textContent = course.heves_kortol;
                modalLocation.textContent = course.helyileg;
                modalImage.src = `/tanfolyamok/kepek/${course.kep}`;
                modalImage.alt = course.nev;
                modal.style.display = 'flex';
            });

            container.appendChild(card);
        });
    } catch (err) {
        console.error('Hiba a tanfolyamok betöltésekor:', err);
        container.innerHTML = '<p>Nem sikerült betölteni a tanfolyamokat.</p>';
    }

    // Modal bezárása
    closeModal.addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });

    // Jelentkezés
    applyButton.addEventListener('click', async () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) { alert('Jelentkezéshez be kell jelentkezni!'); return; }
        const courseId = parseInt(modalTitle.dataset.courseId);
        try {
            const res = await fetch('/api/jelentkezes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.id, kepzesId: courseId })
            });
            const data = await res.json();
            if (res.ok) {
                alert('Sikeres jelentkezés!');
                modal.style.display = 'none';
            } else {
                alert(data.message || 'Hiba történt');
            }
        } catch (err) {
            console.error(err);
            alert('Szerverhiba');
        }
    });

    // Ha user be van jelentkezve, elrejtjük a login/regisztráció linkeket
    const user = JSON.parse(localStorage.getItem('user'));
    if (user) {
        const loginNav = document.getElementById('nav-bejelentkezes');
        const registerNav = document.getElementById('nav-regisztracio');
        if (loginNav) loginNav.style.display = 'none';
        if (registerNav) registerNav.style.display = 'none';
    }
});
</script>
</body>
</html>
