<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --primary: #3399ff;
    --primary-hover: #1a78d1;
    --danger: #ff4d4d;
    --danger-hover: #e63939;
    --surface: #1a1a2e;
    --card-bg: #242440;
    --text: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(180deg, #0f111a, #1a2a4b);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.profil-card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 48px 36px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(51,153,255,0.4);
}

.profil-avatar {
    width: 180px;
    height: 180px;
    margin: 0 auto 24px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    transition: transform 0.2s;
}
.profil-avatar:hover { transform: scale(1.05); }

.profil-avatar img { width: 100%; height: 100%; object-fit: cover; }

.profil-adatok h2 { margin: 8px 0 4px; font-size: 2em; }
.profil-szerep { color: var(--primary); font-weight: 600; margin-bottom: 16px; font-size: 1.1em; }
.profil-bio { font-style: italic; opacity: 0.9; margin-bottom: 28px; font-size: 1.05em; }

.profil-gomb {
    width: 100%;
    padding: 18px;
    margin: 8px 0;
    font-size: 1.15em;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    color: #fff;
    background: var(--primary);
    transition: 0.3s;
}
.profil-gomb:hover { background: var(--primary-hover); box-shadow: 0 6px 20px rgba(51,153,255,0.5); }

.veszely-gomb { background: var(--danger); }
.veszely-gomb:hover { background: var(--danger-hover); box-shadow: 0 6px 20px rgba(255,77,77,0.5); }

.profil-vissza { display:block; margin-top:20px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 1.05em; }
.profil-vissza:hover { text-decoration: underline; }

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 10;
}
.modal-content {
    background: var(--card-bg);
    padding: 32px;
    border-radius: 20px;
    width: 90%;
    max-width: 450px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}
.modal-content textarea,
.modal-content input[type="password"],
.modal-content input[type="file"] {
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #2c2c3c;
    color: #fff;
    font-size: 1.05em;
}

.modal-content button {
    padding: 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}
.modal-content button:hover { opacity: 0.9; }

@media(max-width:480px){
    .profil-card { padding: 36px 24px; }
    .profil-avatar { width: 140px; height: 140px; margin-bottom: 20px; }
    .profil-adatok h2 { font-size: 1.8em; }
    .profil-szerep { font-size: 1em; }
    .profil-bio { font-size: 1em; }
    .profil-gomb { padding: 16px; font-size: 1.05em; }
}
</style>
</head>
<body>

<div class="profil-card">
    <div class="profil-avatar">
        <img id="profileImage" alt="Profilkép">
    </div>
    <div class="profil-adatok">
        <h2 id="nev-megjelenit"></h2>
        <p id="szerep-megjelenit" class="profil-szerep"></p>
        <p id="bioDisplay" class="profil-bio"></p>
    </div>

    <button class="profil-gomb" id="editBioBtn">📝 Bemutatkozás szerkesztése</button>
    <button class="profil-gomb" id="uploadPicBtn">📷 Profilkép feltöltése</button>
    <button class="profil-gomb" id="changePasswordBtn">🔑 Jelszó módosítása</button>
    <button class="profil-gomb veszely-gomb" id="logout">🚪 Kijelentkezés</button>
    <a href="/" class="profil-vissza">⬅ Vissza a főoldalra</a>
</div>

<!-- MODALOK -->
<div id="bioModal" class="modal">
    <div class="modal-content">
        <h2>Bemutatkozás szerkesztése</h2>
        <textarea id="bio-input" rows="4" placeholder="Írd ide a bemutatkozásodat..."></textarea>
        <button id="saveBioBtn">Mentés</button>
        <button class="closeModal">Mégse</button>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>Profilkép feltöltése</h2>
        <input type="file" id="profileFile" accept="image/*">
        <button id="savePicBtn">Feltöltés</button>
        <button class="closeModal">Mégse</button>
    </div>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>Jelszó módosítása</h2>
        <input type="password" id="newPassword" placeholder="Új jelszó">
        <button id="savePasswordBtn">Mentés</button>
        <button class="closeModal">Mégse</button>
    </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
if(!user){ alert("Nincs bejelentkezve!"); location.href="/bejelentkezes"; }

// Adatok
document.getElementById("nev-megjelenit").textContent = user.nev;
const roleMap = { student: "🎓 Diák", teacher: "📘 Tanár", admin: "👑 Admin" };
document.getElementById("szerep-megjelenit").textContent = roleMap[user.role] || "Felhasználó";
document.getElementById("bioDisplay").textContent = user.bio || "";

// Profilkép
const img = document.getElementById("profileImage");
function updateProfileImage() {
    if(user.profilePicture && user.profilePicture.trim()!==""){
        img.src = user.profilePicture;
    } else { img.src="/default-avatar.png"; }
}
updateProfileImage();

// Modalok
const bioModal = document.getElementById("bioModal");
const passwordModal = document.getElementById("passwordModal");
const uploadModal = document.getElementById("uploadModal");

// Gombok
document.getElementById("editBioBtn").onclick = ()=>{ document.getElementById("bio-input").value=user.bio||""; bioModal.style.display="flex";}
document.getElementById("changePasswordBtn").onclick = ()=>{ document.getElementById("newPassword").value=""; passwordModal.style.display="flex";}
document.getElementById("uploadPicBtn").onclick = ()=>{ document.getElementById("profileFile").value=""; uploadModal.style.display="flex";}
document.querySelectorAll(".closeModal").forEach(btn=>{ btn.onclick=()=>{ bioModal.style.display="none"; passwordModal.style.display="none"; uploadModal.style.display="none"; }; });

// Mentés
document.getElementById("saveBioBtn").onclick = ()=>{
    user.bio = document.getElementById("bio-input").value;
    localStorage.setItem("user", JSON.stringify(user));
    document.getElementById("bioDisplay").textContent = user.bio;
    bioModal.style.display="none";
};

document.getElementById("savePasswordBtn").onclick = ()=>{
    const newPass = document.getElementById("newPassword").value;
    if(newPass.trim()===""){ alert("Adj meg egy új jelszót!"); return; }
    user.password = newPass;
    localStorage.setItem("user", JSON.stringify(user));
    passwordModal.style.display="none";
    alert("Jelszó módosítva!");
};

document.getElementById("savePicBtn").onclick = ()=>{
    const file = document.getElementById("profileFile").files[0];
    if(!file){ alert("Válassz egy képet!"); return; }
    const reader = new FileReader();
    reader.onload = e=>{
        user.profilePicture = e.target.result;
        localStorage.setItem("user", JSON.stringify(user));
        updateProfileImage();
        uploadModal.style.display="none";
    };
    reader.readAsDataURL(file);
};

// Kijelentkezés
document.getElementById("logout").onclick = ()=>{
    localStorage.removeItem("user");
    location.href="/";
};
</script>

</body>
</html>
