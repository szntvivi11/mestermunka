<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/style.css">
</head>
<body>
    <style>
        :root {
            --primary: #3399ff;
            --primary-hover: #1a78d1;
            --danger: #ff4d4d;
            --danger-hover: #e63939;
            --surface: #1a1a2e;
            --card-bg: #242440;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0f111a, #1a2a4b);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER / ABSZTRAKT VONAL */
        header {
            position: relative;
            width: 100%;
            height: 240px;
        }
        header svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 220px;
            z-index: 1;
        }

        /* PROFIL KÁRTYA */
        .profil-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 48px 36px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(51,153,255,0.4);
            position: relative;
            top: -80px; 
            margin: 0 auto;
        }

        .profil-avatar {
            width: 180px;
            height: 180px;
            margin: 0 auto 24px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            transition: transform 0.2s;
        }
        .profil-avatar:hover { transform: scale(1.05); }
        .profil-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .profil-adatok h2 { margin: 8px 0 4px; font-size: 2em; }
        .profil-szerep { color: var(--primary); font-weight: 600; margin-bottom: 16px; font-size: 1.1em; }
        .profil-bio { font-style: italic; opacity: 0.9; margin-bottom: 28px; font-size: 1.05em; }

        .profil-gomb {
            width: 100%;
            padding: 18px;
            margin: 8px 0;
            font-size: 1.15em;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: #fff;
            background: var(--primary);
            transition: 0.3s;
        }
        .profil-gomb:hover { background: var(--primary-hover); box-shadow: 0 6px 20px rgba(51,153,255,0.5); }

        .veszely-gomb { background: var(--danger); }
        .veszely-gomb:hover { background: var(--danger-hover); box-shadow: 0 6px 20px rgba(255,77,77,0.5); }

        .profil-vissza { display:block; margin-top:20px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 1.05em; }
        .profil-vissza:hover { text-decoration: underline; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content textarea,
        .modal-content input[type="password"],
        .modal-content input[type="text"],
        .modal-content input[type="email"],
        .modal-content input[type="number"],
        .modal-content input[type="file"] {
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #2c2c3c;
            color: #fff;
            font-size: 1.05em;
        }
        .modal-content button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .modal-content button:hover { opacity: 0.9; }

        @media(max-width:480px){
            .profil-card { padding: 36px 24px; }
            .profil-avatar { width: 140px; height: 140px; margin-bottom: 20px; }
            .profil-adatok h2 { font-size: 1.8em; }
            .profil-gomb { padding: 16px; font-size: 1.05em; }
        }
    </style>

<header>
    <svg viewBox="0 0 1440 400" preserveAspectRatio="none" style="position:absolute; top:0; left:0; width:100%; height:220px; z-index:0;">
        <defs>
            <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#3399ff"/>
                <stop offset="100%" stop-color="#66b3ff"/>
            </linearGradient>
            <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#66b3ff"/>
                <stop offset="100%" stop-color="#a0d4ff"/>
            </linearGradient>
        </defs>
        <path d="M0,180 C240,120 480,240 720,180 C960,120 1200,240 1440,180 L1440,320 C1200,380 960,100 720,320 C480,540 240,100 0,320 Z" fill="url(#wave1)" fill-opacity="0.85"/>
        <path d="M0,210 C360,90 1080,330 1440,210 L1440,350 C1200,400 960,180 720,350 C480,520 240,180 0,350 Z" fill="url(#wave2)" fill-opacity="0.65"/>
    </svg>
</header>

<div class="profil-card" style="position: relative; z-index: 2; top: -100px; margin: 0 auto;">
    <div class="profil-avatar">
        <img id="profileImage" alt="Profilkép">
    </div>
    <div class="profil-adatok">
        <h2 id="nev-megjelenit"></h2>
        <p id="szerep-megjelenit" class="profil-szerep"></p>
        <p id="bioDisplay" class="profil-bio"></p>
    </div>

    <button class="profil-gomb" id="editBioBtn">📝 Bemutatkozás szerkesztése</button>
    <button class="profil-gomb" id="uploadPicBtn">📷 Profilkép feltöltése</button>
    <button class="profil-gomb" id="changePasswordBtn">🔑 Jelszó módosítása</button>
    <button class="profil-gomb veszely-gomb" id="logout">🚪 Kijelentkezés</button>
    <a href="/" class="profil-vissza">⬅ Vissza a főoldalra</a>
</div>

<div id="bioModal" class="modal">
    <div class="modal-content">
        <h2>Bemutatkozás szerkesztése</h2>
        <textarea id="bio-input" rows="4" placeholder="Írd ide a bemutatkozásodat..."></textarea>
        <button id="saveBioBtn" style="background: var(--primary); color:white;">Mentés</button>
        <button class="closeModal" style="background: #444; color:white;">Mégse</button>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>Profilkép feltöltése</h2>
        <input type="file" id="profileFile" accept="image/*">
        <button id="savePicBtn" style="background: var(--primary); color:white;">Feltöltés</button>
        <button class="closeModal" style="background: #444; color:white;">Mégse</button>
    </div>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>Jelszó módosítása</h2>
        <input type="password" id="newPassword" placeholder="Új jelszó">
        <button id="savePasswordBtn" style="background: var(--primary); color:white;">Mentés</button>
        <button class="closeModal" style="background: #444; color:white;">Mégse</button>
    </div>
</div>

<div id="addCourseModal" class="modal">
    <div class="modal-content">
        <h2>Tanfolyam hozzáadása</h2>
        <input type="text" id="courseName" placeholder="Tanfolyam neve">
        <textarea id="courseDescription" placeholder="Tanfolyam leírása"></textarea>
        <input type="text" id="courseLocation" placeholder="Helyszín">
        <input type="email" id="courseEmail" placeholder="Kapcsolattartó email">
        <input type="number" id="coursePrice" placeholder="Ár (Ft)">
        <label style="font-size: 0.9em; color: var(--primary);">Tanfolyam borítóképe:</label>
        <input type="file" id="courseImageFile" accept="image/*"> <input type="text" id="courseOwner" placeholder="Tulajdonos neve">
        <input type="number" id="courseAgeLimit" placeholder="Korhatár">
        <button id="saveCourseBtn" style="background: var(--primary); color:white;">Mentés</button>
        <button class="closeModal" style="background: #444; color:white;">Mégse</button>
    </div>
</div>

<script>
    // 1. Felhasználó ellenőrzése
    let user = null;
    try {
        const userData = localStorage.getItem("user");
        if (userData) user = JSON.parse(userData);
    } catch (e) { console.error("Hibás user adat."); }

    if (!user) {
        alert("Nincs bejelentkezve!");
        location.href = "/bejelentkezes";
    }

    // 2. Adatok megjelenítése
    document.getElementById("nev-megjelenit").textContent = user.nev;
    const roleMap = { student: "🎓 Diák", teacher: "📘 Tanár", admin: "👑 Admin" };
    document.getElementById("szerep-megjelenit").textContent = roleMap[user.role] || "Felhasználó";
    document.getElementById("bioDisplay").textContent = user.bio || "";

    const img = document.getElementById("profileImage");
    function updateProfileImage() {
        img.src = (user.profilePicture && user.profilePicture.trim() !== "") ? user.profilePicture : "/default-avatar.png";
    }
    updateProfileImage();

    // 3. Modál kezelők
    const modals = ["bioModal", "passwordModal", "uploadModal", "addCourseModal"];
    
    document.getElementById("editBioBtn").onclick = () => { document.getElementById("bio-input").value = user.bio || ""; document.getElementById("bioModal").style.display = "flex"; }
    document.getElementById("changePasswordBtn").onclick = () => { document.getElementById("passwordModal").style.display = "flex"; }
    document.getElementById("uploadPicBtn").onclick = () => { document.getElementById("uploadModal").style.display = "flex"; }
    
    document.querySelectorAll(".closeModal").forEach(btn => {
        btn.onclick = () => { modals.forEach(m => document.getElementById(m).style.display = "none"); };
    });

    // 4. Mentés funkciók (Profil)
    document.getElementById("saveBioBtn").onclick = () => {
        user.bio = document.getElementById("bio-input").value;
        localStorage.setItem("user", JSON.stringify(user));
        document.getElementById("bioDisplay").textContent = user.bio;
        document.getElementById("bioModal").style.display = "none";
    };

    document.getElementById("savePicBtn").onclick = () => {
        const file = document.getElementById("profileFile").files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            user.profilePicture = e.target.result;
            localStorage.setItem("user", JSON.stringify(user));
            updateProfileImage();
            document.getElementById("uploadModal").style.display = "none";
        };
        reader.readAsDataURL(file);
    };

    document.getElementById("logout").onclick = () => {
        localStorage.removeItem("user");
        location.href = "/";
    };

    // 5. TANÁR / ADMIN GOMBOK
    const card = document.querySelector(".profil-card");
    const logoutBtn = document.getElementById("logout");

    if (user.role === "teacher") {
        const teacherBtn = document.createElement("button");
        teacherBtn.textContent = "➕ Tanfolyam hozzáadása";
        teacherBtn.className = "profil-gomb";
        teacherBtn.onclick = () => document.getElementById("addCourseModal").style.display = "flex";
        card.insertBefore(teacherBtn, logoutBtn);
    }

    if (user.role === "admin") {
        const adminBox = document.createElement("div");
        adminBox.style.marginTop = "20px";
        adminBox.innerHTML = `
            <button class="profil-gomb" onclick="location.href='/admin'" style="background:#7b2ff2;">📧 Üzenetek Kezelése</button>
            <button class="profil-gomb" onclick="location.href='/admin_full.html'" style="background:linear-gradient(45deg, #7b2ff2, #3399ff)">🛠️ Rendszer Kezelése</button>
        `;
        card.insertBefore(adminBox, logoutBtn);
    }

    // 6. TANFOLYAM MENTÉSE - FORM DATA-VAL JAVÍTVA
    document.getElementById("saveCourseBtn").onclick = async () => {
        const fileInput = document.getElementById("courseImageFile");
        
        if (!fileInput.files[0]) {
            alert("Kérlek, válassz ki egy képet a tanfolyamhoz!");
            return;
        }

        const formData = new FormData();
        // A "kep" kulcsnak egyeznie kell a szerveroldali upload.single('kep') beállítással!
        formData.append("kep", fileInput.files[0]);
        formData.append("nev", document.getElementById("courseName").value);
        formData.append("leiras", document.getElementById("courseDescription").value);
        formData.append("helyileg", document.getElementById("courseLocation").value);
        formData.append("email", document.getElementById("courseEmail").value);
        formData.append("ár", document.getElementById("coursePrice").value);
        formData.append("o_nev", document.getElementById("courseOwner").value);
        formData.append("heves_kortol", document.getElementById("courseAgeLimit").value);
        formData.append("ua_ID", user.id);

        try {
            const res = await fetch("/api/courses", {
                method: "POST",
                // FONTOS: FormData esetén NEM szabad Content-Type headert megadni!
                body: formData
            });

            const result = await res.json();

            if (res.ok && result.success) {
                alert("Tanfolyam sikeresen hozzáadva!");
                document.getElementById("addCourseModal").style.display = "none";
                // Opcionális: űrlap ürítése
                location.reload();
            } else {
                alert("Hiba: " + (result.message || "Szerver hiba történt."));
            }
        } catch (err) {
            console.error(err);
            alert("Hiba történt a küldés során.");
        }
    };
</script>
</body>
</html>
