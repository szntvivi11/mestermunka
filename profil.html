<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Profil</h1>
        <a href="/" style="position: absolute; top: 10px; right: 10px; padding: 10px 20px; background-color: #007BFF; color: white; text-decoration: none; border-radius: 5px;">Vissza a főoldalra</a>
        <img id="profileImage" src="" alt="Profilkép" style="display:none; width:150px; height:150px; border-radius:50%; margin-bottom:20px;">
    </header>
    <main>
        <p>Üdvözlünk a profil oldaladon! Itt megtekintheted és szerkesztheted a személyes adataidat.</p>
        <p><strong>Felhasználónév:</strong> <span id="username"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>


        <form id="uploadForm" enctype="multipart/form-data">
            <label for="profilePicture">Profilkép feltöltése:</label>
            <input type="file" id="profilePicture" name="profilePicture" accept="image/*">
            <button type="submit">Feltöltés</button>
        </form>

        <button id="logout">Kijelentkezés</button>
    </main>
    <script>
        // Avoid redeclaring the 'user' variable
        let user = JSON.parse(localStorage.getItem('user')) || null;
        if (user) {
            document.getElementById('username').textContent = user.nev;
            document.getElementById('email').textContent = user.email;

            if (user.profilePicture) {
                const profileImage = document.getElementById('profileImage');
                profileImage.src = user.profilePicture;
                profileImage.style.display = 'block';
            }

            // Display user role (student or teacher) based on login selection
            if (user.role) {
                const roleElement = document.createElement('p');
                
                document.querySelector('main').appendChild(roleElement);
            }

            // Ensure the role is displayed correctly next to email and username
            if (user && user.role) {
                const roleElement = document.createElement('p');
                roleElement.innerHTML = `<strong>Szerep:</strong> ${user.role}`;
                document.getElementById('email').parentElement.appendChild(roleElement);
            } else {
                console.error('User role is missing or undefined.');
            }

            // Dynamically update the header based on the user's role
            if (user && user.role) {
                const headerTitle = document.querySelector('header h1');
                if (headerTitle) {
                    const role = user.role.toLowerCase();
                    let roleText;
                    switch (role) {
                        case 'student':
                            roleText = 'Diákprofil';
                            break;
                        case 'teacher':
                            roleText = 'Tanári profil';
                            break;
                        case 'admin':
                            roleText = 'Adminprofil';
                            break;
                        default:
                            roleText = 'Profil';
                    }
                    headerTitle.textContent = roleText;
                }
            } else {
                console.error('User role is missing or undefined.');
            }
        } else {
            alert('Nincs bejelentkezve! Kérjük, jelentkezzen be.');
            window.location.href = '/bejelentkezes';
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            const response = await fetch('/api/upload-profile-picture', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            alert(result.message);
        });

        document.getElementById('logout').addEventListener('click', () => {
            localStorage.removeItem('user');
            window.location.href = '/';
        });
    </script>
    <script>
        // Check if the user is logged in and hide the login/register links
        if (user) {
            const loginNav = document.getElementById('nav-bejelentkezes');
            const registerNav = document.getElementById('nav-regisztracio');
            if (loginNav) loginNav.style.display = 'none';
            if (registerNav) registerNav.style.display = 'none';
        }
    </script>
</body>
</html>
