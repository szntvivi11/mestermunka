<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/style.css">
</head>
<body>
    <style>
        :root {
            --primary: #3399ff;
            --primary-hover: #1a78d1;
            --danger: #ff4d4d;
            --danger-hover: #e63939;
            --surface: #1a1a2e;
            --card-bg: #242440;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0f111a, #1a2a4b);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER / ABSZTRAKT VONAL */
        header {
            position: relative;
            width: 100%;
            height: 240px;
        }
        header svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 220px;
            z-index: 1;
        }

        /* PROFIL KÁRTYA */
        .profil-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 48px 36px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(51,153,255,0.4);
            position: relative;
            top: -80px; 
            margin: 0 auto;
        }

        .profil-avatar {
            width: 180px;
            height: 180px;
            margin: 0 auto 24px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            transition: transform 0.2s;
            border: 2px solid #3399ff; 
            background: transparent; /* Átlátszó háttér */
        }
        .profil-avatar:hover { transform: scale(1.05); }
        .profil-avatar img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; /* Biztosítja, hogy a kép kitöltse a teret */
        }

        .profil-adatok h2 { margin: 8px 0 4px; font-size: 2em; }
        .profil-szerep { color: var(--primary); font-weight: 600; margin-bottom: 16px; font-size: 1.1em; }
        .profil-bio { font-style: italic; opacity: 0.9; margin-bottom: 28px; font-size: 1.05em; }

        .profil-gomb {
            width: 100%;
            padding: 18px;
            margin: 8px 0;
            font-size: 1.15em;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: #fff;
            background: var(--primary);
            transition: 0.3s;
        }
        .profil-gomb:hover { background: var(--primary-hover); box-shadow: 0 6px 20px rgba(51,153,255,0.5); }

        .veszely-gomb { background: var(--danger); }
        .veszely-gomb:hover { background: var(--danger-hover); box-shadow: 0 6px 20px rgba(255,77,77,0.5); }

        .profil-vissza { display:block; margin-top:20px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 1.05em; }
        .profil-vissza:hover { text-decoration: underline; }

        /* MODAL */
        .modal {
    display: none; 
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 10000;
    backdrop-filter: blur(5px);
    
    /* JAVÍTÁS: Nem align-items: center-t használunk, 
       hanem engedjük a függőleges görgetést a teljes háttéren */
    overflow-y: auto; 
    padding: 40px 20px; /* Térköz a tetején és alján, hogy ne ragadjon a széléhez */
    display: none; /* JS-ből kapja majd a flex-et */
    justify-content: center;
    align-items: flex-start; /* A tetejétől indul a tartalom */
}

/* Amikor aktív a modal, ezt kapja JS-ből (vagy manuálisan teszed rá) */
.modal[style*="display: block"],
.modal[style*="display: flex"] {
    display: flex !important;
}

.modal-content {
    background: var(--card-bg);
    border-radius: 20px;
    width: 100%;
    max-width: 550px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    margin-bottom: 40px; /* Alsó biztonsági távolság */
    
    /* Itt már nem kell max-height és belső overflow, 
       mert az egész modal háttér görgethető lett */
}
        .modal-content textarea,
        .modal-content input[type="password"],
        .modal-content input[type="text"],
        .modal-content input[type="email"],
        .modal-content input[type="number"],
        .modal-content input[type="file"] {
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #2c2c3c;
            color: #fff;
            font-size: 1.05em;
        }
        .modal-content button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .modal-content button:hover { opacity: 0.9; }

        @media(max-width:480px){
            .profil-card { padding: 36px 24px; }
            .profil-avatar { width: 140px; height: 140px; margin-bottom: 20px; }
            .profil-adatok h2 { font-size: 1.8em; }
            .profil-gomb { padding: 16px; font-size: 1.05em; }
        }
        /* Tanfolyam modal specifikus igazítás */
.tanfolyam-modal .modal-body {
    padding: 20px;
    overflow-y: visible; /* A tartalom mehet belül */
}

/* Görgetősáv stílusosabbá tétele (Chrome/Safari/Edge) */
.modal-content::-webkit-scrollbar {
    width: 8px;
}

.modal-content::-webkit-scrollbar-track {
    background: #1a1a2e;
    border-radius: 10px;
}

.modal-content::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
}
/* Tanfolyam modal specifikus kiegészítés */
.tanfolyam-modal {
    overflow: hidden; /* A kerekített sarkok miatt */
    display: flex;
    flex-direction: column;
}

/* Görgetősáv stílusosabbá tétele a teljes modal háttéren */
.modal::-webkit-scrollbar {
    width: 10px;
}
.modal::-webkit-scrollbar-track {
    background: #0f111a;
}
.modal::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
    border: 2px solid #0f111a;
}

/* Ha fekvő módban van a telefon vagy nagyon kicsi a laptop kijelző */
@media (max-height: 600px) {
    .modal-content {
        max-height: 95vh;
    }
    .modal-header {
        padding: 15px;
    }
    .modal-body {
        gap: 10px;
    }
}

        .tanfolyam-modal {
    max-width: 550px; /* Szélesebb, hogy kényelmesebb legyen */
    padding: 0; /* A belső paddinget a header/body kapja */
    overflow: hidden;
}

.modal-header {
    background: linear-gradient(135deg, #1a2a4b, #242440);
    padding: 25px;
    border-bottom: 2px solid var(--primary);
    text-align: center;
}

.modal-header h2 {
    margin: 0;
    font-size: 1.5em;
    color: var(--primary);
}

.modal-header p {
    font-size: 0.9em;
    opacity: 0.7;
    margin-top: 5px;
}
.modal-body {
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
}

.input-group label {
    font-size: 0.85em;
    font-weight: bold;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* Fájlfeltöltő gomb design */
.file-upload-wrapper {
    margin-top: 10px;
    text-align: center;
}

.custom-file-upload {
    display: inline-block;
    padding: 12px 20px;
    background: rgba(51, 153, 255, 0.1);
    border: 2px dashed var(--primary);
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}

.custom-file-upload:hover {
    background: rgba(51, 153, 255, 0.2);
}

#courseImageFile {
    display: none; /* Elrejtjük az eredetit */
}

.modal-footer {
    padding: 20px 25px 30px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.primary-btn {
    background: var(--primary) !important;
    color: white;
    font-size: 1.1em !important;
    box-shadow: 0 4px 15px rgba(51, 153, 255, 0.3);
}

.secondary-btn {
    background: transparent !important;
    color: #aaa !important;
    border: 1px solid #444 !important;
}

.secondary-btn:hover {
    color: white !important;
    border-color: #666 !important;
}

@media (max-width: 480px) {
    .input-row {
        grid-template-columns: 1fr;
    }
}

    </style>

<header>
    <div class="header-wave-container">
     <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <defs>
                <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#1a2a4b; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#3399ff; stop-opacity:1" />
                </linearGradient>
            </defs>
            <path fill="rgba(51, 153, 255, 0.2)" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,218.7C960,235,1056,213,1152,186.7C1248,160,1344,128,1392,112L1440,96L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
            <path fill="url(#wave-grad)" d="M0,128L48,138.7C96,149,192,171,288,165.3C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
        </svg>
         </div>
</header>

<div class="profil-card" style="position: relative; z-index: 2; top: -100px; margin: 0 auto;">
    <div class="profil-avatar">
        <img id="profileImage" src="https://via.placeholder.com/180/242440/3399ff?text=Avatar" alt="Profilkép">
    </div>
    <div class="profil-adatok">
        <h2 id="nev-megjelenit"></h2>
        <p id="szerep-megjelenit" class="profil-szerep"></p>
        <p id="bioDisplay" class="profil-bio"></p>
    </div>

    <button class="profil-gomb" id="editBioBtn">📝 Bemutatkozás szerkesztése</button>
    <button class="profil-gomb" id="uploadPicBtn">📷 Profilkép feltöltése</button>
    <button class="profil-gomb" id="changePasswordBtn">🔑 Jelszó módosítása</button>
    <button class="profil-gomb veszely-gomb" id="logout">🚪 Kijelentkezés</button>
    <a href="/" class="profil-vissza">⬅ Vissza a főoldalra</a>
</div>

<div id="bioModal" class="modal">
    <div class="modal-content">
        <h2>Bemutatkozás szerkesztése</h2>
        <textarea id="bio-input" rows="4" placeholder="Írd ide a bemutatkozásodat..."></textarea>
        <button id="saveBioBtn" style="background: var(--primary); color:white;">Mentés</button>
        <button class="closeModal" style="background: #444; color:white;">Mégse</button>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>Profilkép feltöltése</h2>
        <input type="file" id="profileFile" accept="image/*">
        <button id="savePicBtn" style="background: var(--primary); color:white;">Feltöltés</button>
        <button class="closeModal" style="background: #444; color:white;">Mégse</button>
    </div>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>Jelszó módosítása</h2>
        <input type="password" id="newPassword" placeholder="Új jelszó">
        <button id="savePasswordBtn" style="background: var(--primary); color:white;">Mentés</button>
        <button class="closeModal" style="background: #444; color:white;">Mégse</button>
    </div>
</div>

<div id="addCourseModal" class="modal">
    <div class="modal-content tanfolyam-modal">
        <div class="modal-header">
            <h2>🚀 Új tanfolyam hirdetése</h2>
            <p>Töltsd ki az adatokat a közzétételhez</p>
        </div>

        <div class="modal-body">
            <div class="input-group">
                <label><i class="icon">🏷️</i> Tanfolyam neve</label>
                <input type="text" id="courseName" placeholder="Pl. Kezdő Webfejlesztés">
            </div>

            <div class="input-group">
                <label><i class="icon">📝</i> Leírás</label>
                <textarea id="courseDescription" rows="3" placeholder="Miről szól a képzés?"></textarea>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label><i class="icon">📍</i> Helyszín</label>
                    <input type="text" id="courseLocation" placeholder="Város vagy Online">
                </div>
                <div class="input-group">
                    <label><i class="icon">👤</i> Oktató / Tulaj</label>
                    <input type="text" id="courseOwner" placeholder="Saját neved">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label><i class="icon">💰</i> Ár (Ft)</label>
                    <input type="number" id="coursePrice" placeholder="50000">
                </div>
                <div class="input-group">
                    <label><i class="icon">🔞</i> Korhatár</label>
                    <input type="number" id="courseAgeLimit" placeholder="Pl. 18">
                </div>
            </div>

            <div class="input-group">
                <label><i class="icon">📧</i> Kapcsolattartó email</label>
                <input type="email" id="courseEmail" placeholder="pelda@email.hu">
            </div>

            <div class="file-upload-wrapper">
                <label for="courseImageFile" class="custom-file-upload">
                    <span>🖼️ Borítókép kiválasztása</span>
                </label>
                <input type="file" id="courseImageFile" accept="image/*">
                <p id="fileNameDisplay" style="font-size: 0.8em; color: var(--primary); margin-top: 5px;"></p>
            </div>
        </div>

        <div class="modal-footer">
            <button id="saveCourseBtn" class="primary-btn">✨ Tanfolyam közzététele</button>
            <button class="closeModal secondary-btn">Mégse</button>
        </div>
    </div>
</div>

<script src="/profil.js?v=1"></script>
</body>
</html>
