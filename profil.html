<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    
    <h1 id="profil-cim">Profil</h1>
</header>

<main class="profil-container">

    <!-- PROFIL KÁRTYA -->
    <section class="profil-fejlec-kartya">

        <div class="profil-avatar">
            <img id="profileImage" alt="Profilkép">
        </div>
    
        <div class="profil-fejlec-adatok">
            <h2 id="nev-megjelenit"></h2>
            <p class="profil-szerep" id="szerep-megjelenit"></p>
        </div>
    
    </section>

    <!-- SZERKESZTÉS -->
    <section class="profil-kartya">
        <h2>Profil szerkesztése</h2>

        <form id="editForm" class="auth-form">
            <label>Felhasználónév</label>
            <input type="text" id="nev-input">

            <label>Email</label>
            <input type="email" id="email-input">

            <label>Bemutatkozás</label>
            <textarea id="bio-input" rows="3"></textarea>

            <button type="submit">Mentés</button>
        </form>
    </section>

    <!-- PROFILKÉP -->
    <section class="profil-kartya">
        <h2>Profilkép</h2>

        <form id="uploadForm" class="auth-form" enctype="multipart/form-data">
            <input type="file" name="profilePicture" accept="image/*">
            <button type="submit">Feltöltés</button>
        </form>
    </section>

    <!-- BIZTONSÁG -->
    <section class="profil-kartya">
        <h2>Biztonság</h2>

        <form class="auth-form">
            <label>Új jelszó</label>
            <input type="password" placeholder="********">
            <button type="button">Jelszó módosítása</button>
        </form>

        <button id="logout" class="veszely-gomb">Kijelentkezés</button>
    </section>

    <a href="/" class="profil-vissza">⬅ Vissza a főoldalra</a>

</main>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Nincs bejelentkezve!");
    location.href = "/bejelentkezes";
}

// NÉV + SZEREP
document.getElementById("nev-megjelenit").textContent = user.nev;

const roleMap = {
    student: "🎓 Diák",
    teacher: "📘 Tanár",
    admin: "👑 Admin"
};

document.getElementById("szerep-megjelenit").textContent =
    roleMap[user.role] || "Felhasználó";

// PROFILKÉP MEGJELENÍTÉS
const img = document.getElementById("profileImage");

if (user.profilePicture && user.profilePicture.trim() !== "") {
    img.src = user.profilePicture;
    img.style.display = "block";
} else {
    img.style.display = "none";
}

// ŰRLAP ELŐTÖLTÉS
document.getElementById("nev-input").value = user.nev;
document.getElementById("email-input").value = user.email;
document.getElementById("bio-input").value = user.bio || "";

// MENTÉS
document.getElementById("editForm").addEventListener("submit", e => {
    e.preventDefault();
    user.nev = nev-input.value;
    user.email = email-input.value;
    user.bio = bio-input.value;

    localStorage.setItem("user", JSON.stringify(user));
    location.reload();
});

// KIJELENTKEZÉS
document.getElementById("logout").onclick = () => {
    localStorage.removeItem("user");
    location.href = "/";
};
</script>

</body>
</html>
