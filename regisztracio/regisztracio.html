<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regisztráció</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Üzenetek */
    .login-message {
      padding: 12px 20px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-weight: bold;
    }
    .login-success { background-color: #4caf50; color: white; }
    .login-error { background-color: #f44336; color: white; }

    /* Tanfolyamadó mezők elrejtése alapból */
    .teacher-fields { display: none; }
  </style>
</head>
<body>
<header id="absztrakt-vonal">
  <div id="absztrakt-vonal">
		<div style="position: relative; width: 100%; height: 240px;">
			<svg viewBox="0 0 1440 400" width="100%" height="220" preserveAspectRatio="none" style="display:block; position:absolute; top:0; left:0; z-index:1;">
				<defs>
					<linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
						<stop offset="80%" stop-color="#fff" stop-opacity="0" />
						<stop offset="100%" stop-color="#fff" stop-opacity="0.7" />
					</linearGradient>
					
					<linearGradient id="absztrakt-stripes" x1="0" y1="0" x2="1" y2="0">
						<stop offset="0%" stop-color="#f22f2f" />
						<stop offset="60%" stop-color="#8b0000" />
						<stop offset="100%" stop-color="#000000" />
					</linearGradient>
					<linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
						<stop offset="0%" stop-color="#7b2ff2" />
						<stop offset="100%" stop-color="#b185f5" />
					</linearGradient>
					<linearGradient id="wave2" x1="0" y1="0" x2="1" y2="1">
						<stop offset="0%" stop-color="#b185f5" />
						<stop offset="100%" stop-color="#e0c3fc" />
					</linearGradient>
				</defs>
				<path d="M0,180 C240,120 480,240 720,180 C960,120 1200,240 1440,180 L1440,320 C1200,380 960,100 720,320 C480,540 240,100 0,320 Z" fill="url(#wave1)" fill-opacity="0.85"></path>
				<path d="M0,210 C360,90 1080,330 1440,210 L1440,350 C1200,400 960,180 720,350 C480,520 240,180 0,350 Z" fill="url(#wave2)" fill-opacity="0.65"></path>
			</svg>
  <nav id="navigacio" style="position: relative; z-index: 2; display:flex; justify-content:center; gap:24px; padding-top:120px; font-size:18px;">
    <a href="/" id="nav-fooldal">Főoldal</a>
    <a href="/tanfolyamok" id="nav-tanfolyamok">Tanfolyamok</a>
    <a href="/bejelentkezes" id="nav-bejelentkezes">Bejelentkezés</a>
    <a href="/regisztracio" id="nav-regisztracio">Regisztráció</a>
    <a href="/kapcsolat" id="nav-kapcsolat">Kapcsolat</a>
    <a href="/profil" id="nav-profil">Profil</a>
  </nav>
</header>

<main style="position: relative; z-index: 3;">
  <div class="aloldal-container">
    <h1>Regisztráció</h1>

    <!-- Választás: Felhasználó / Tanfolyamadó -->
    <label>
      <input type="radio" name="role" value="user" checked> Sima felhasználó
    </label>
    <label>
      <input type="radio" name="role" value="teacher"> Tanfolyamadó
    </label>

    <form class="auth-form" id="register-form">
      <label for="reg-username">Felhasználónév</label>
      <input id="reg-username" type="text" required>

      <label for="reg-email">Email</label>
      <input id="reg-email" type="email" required>

      <label for="reg-password">Jelszó</label>
      <input id="reg-password" type="password" required>

      <!-- Tanfolyamadó mezők -->
      <div class="teacher-fields">
        <label for="teacher-course">Kurzus / végzettség</label>
        <input id="teacher-course" type="text">

      </div>

      <button type="submit">Regisztráció</button>
    </form>

    <div id="message" class="message"></div>

    <p style="margin-top:20px;">
      Van már fiókod?
      <a href="/bejelentkezes">Jelentkezz be</a>
    </p>
  </div>
</main>

<footer id="footer">
  <div class="footer-container">
    <p>&copy; 2025 MyWebsite. Minden jog fenntartva.</p>
    <nav class="footer-nav">
      <a href="/">Főoldal</a>
      <a href="/tanfolyamok">Tanfolyamok</a>
      <a href="/kapcsolat">Kapcsolat</a>
      <a href="/bejelentkezes">Bejelentkezés</a>
    </nav>
  </div>
</footer>

<script>
  // ==== Választás: user / teacher ====
  const roleRadios = document.querySelectorAll('input[name="role"]');
  const teacherFields = document.querySelector('.teacher-fields');

  roleRadios.forEach(radio => {
    radio.addEventListener('change', () => {
      teacherFields.style.display = radio.value === 'teacher' ? 'block' : 'none';
    });
  });

  // ==== SHOW MESSAGE ====
  function showMessage(msg, type = "success") {
    const container = document.querySelector(".aloldal-container");
    const existing = document.querySelector(".login-message");
    if (existing) existing.remove();

    const message = document.createElement("div");
    message.className = `login-message ${type === "error" ? "login-error" : "login-success"}`;
    message.textContent = msg;
    container.prepend(message);
  }

  // ==== REGISZTRÁCIÓ ====
  const form = document.getElementById('register-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const role = document.querySelector('input[name="role"]:checked').value;
    const nev = document.getElementById("reg-username").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const jelszo = document.getElementById("reg-password").value.trim();
    const vegzettseg = document.getElementById("teacher-course").value.trim();

    if (!nev || !email || !jelszo) {
      showMessage("❌ Kérlek, tölts ki minden kötelező mezőt!", "error");
      return;
    }

    if (role === 'teacher' && !vegzettseg) {
      showMessage("❌ Kérlek, add meg a végzettséged!", "error");
      return;
    }

    try {
      const res = await fetch(role === 'user' ? '/api/register-user' : '/api/register-teacher', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          nev, 
          felhasznalonev: nev,
          email, 
          jelszo, 
          vegzettseg, 
        })
      });

      const data = await res.json();
      if (data.success) {
        showMessage("✅ Sikeres regisztráció!", "success");
        form.reset();
        teacherFields.style.display = 'none';
        setTimeout(() => window.location.href = "/bejelentkezes", 1500);
      } else {
        showMessage(data.message || "❌ Hiba a regisztráció során", "error");
      }
    } catch (err) {
      console.error(err);
      showMessage("❌ Szerverhiba", "error");
    }
  });

  // ==== Hide 'Profil' link if user is not logged in ====
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user) {
    document.querySelector('a[href="/profil"]').style.display = 'none';
  }

  // Check if the user is logged in and hide the login/register links
  if (user) {
    const loginNav = document.getElementById('nav-bejelentkezes');
    const registerNav = document.getElementById('nav-regisztracio');
    if (loginNav) loginNav.style.display = 'none';
    if (registerNav) registerNav.style.display = 'none';
  }
</script>
</body>
</html>
