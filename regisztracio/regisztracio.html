<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regisztráció</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Üzenetek */
    .login-message {
      padding: 12px 20px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-weight: bold;
    }
    .login-success { background-color: #4caf50; color: white; }
    .login-error { background-color: #f44336; color: white; }

    /* Tanfolyamadó mezők elrejtése alapból */
    .teacher-fields { display: none; }
  </style>
</head>
<body>
 <header id="fejlec">
  <div class="logo-container">
    <a href="/">
        <img src="./Tanfolyamok/kepek/logooo.png" alt="Logo" class="header-logo">
    </a>
</div>
    <div class="header-wave-container">
        <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <defs>
                <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#1a2a4b; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#3399ff; stop-opacity:1" />
                </linearGradient>
            </defs>
            <path fill="rgba(51, 153, 255, 0.2)" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,218.7C960,235,1056,213,1152,186.7C1248,160,1344,128,1392,112L1440,96L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
            <path fill="url(#wave-grad)" d="M0,128L48,138.7C96,149,192,171,288,165.3C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
        </svg>

        <nav id="navigacio">
            <a id="nav-fo" href="/">Főoldal</a>
            <a id="nav-tanfolyamok" href="/tanfolyamok">Tanfolyamok</a>
            <a id="nav-bejelentkezes" href="/bejelentkezes">Bejelentkezés</a>
            <a id="nav-regisztracio" href="/regisztracio">Regisztráció</a>
            <a id="nav-kapcsolat" href="/kapcsolat">Kapcsolat</a>
            <a id="nav-rolunk" href="/rolunk">Rólunk</a>
        </nav>
    </div>
</header>

<main style="position: relative; z-index: 3;">
  <div class="aloldal-container">
    <h1>Regisztráció</h1>
    <p class="auth-subtitle">Hozd létre a fiókod pár kattintással!</p>

    <form class="auth-form" id="register-form">
      
      <div class="role-selection">
        <span class="role-title">Válaszd ki a szerepköröd:</span>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="role" value="user" checked>
            <span class="custom-radio">Tanuló</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="role" value="teacher">
            <span class="custom-radio">Oktató</span>
          </label>
        </div>
      </div>

      <div class="input-group">
        <label for="reg-username">Felhasználónév</label>
        <input id="reg-username" type="text" placeholder="Példa: Janika99" required>
      </div>

      <div class="input-group">
        <label for="reg-email">Email cím</label>
        <input id="reg-email" type="email" placeholder="pelda@email.hu" required>
      </div>

      <div class="input-group">
        <label for="reg-password">Jelszó</label>
        <input id="reg-password" type="password" placeholder="••••••••" required>
      </div>

      <div class="teacher-fields input-group" id="teacher-section">
        <label for="teacher-course">Legmagasabb végzettség</label>
        <select id="teacher-course" class="auth-form-input">
          <option value="">-- Kérlek, válassz! --</option>
          <option value="msc">8 általános</option>
          <option value="erettsegi">Érettségi</option>
          <option value="bsc">Szakközép</option>
          <option value="diploma">Diploma</option>
          <option value="phd">Doktori (PhD)</option>
          <option value="egyeb">Egyéb</option>
        </select>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Regisztráció</button>
    </form>

    <div id="message" class="message"></div>

    <p class="auth-footer-text">
      Van már fiókod? 
      <a href="/bejelentkezes">Jelentkezz be itt!</a>
    </p>
  </div>
</main>

<footer id="footer">
  <div class="footer-container">
      <p>&copy; 
          BGSZC Pestszentlőrinci Technikum | Mestermunka 2026</p>
          <nav class="footer-nav">
          <a href="/">Főoldal</a>
          <a href="/tanfolyamok">Tanfolyamok</a>
          <a href="/kapcsolat">Kapcsolat</a>
          <a href="/bejelentkezes">Bejelentkezés</a>
      </nav>
  </div>
</footer>
<script>
  // ==== Választás: user / teacher ====
  const roleRadios = document.querySelectorAll('input[name="role"]');
  const teacherFields = document.querySelector('.teacher-fields');

  roleRadios.forEach(radio => {
    radio.addEventListener('change', () => {
      teacherFields.style.display = radio.value === 'teacher' ? 'block' : 'none';
    });
  });

  // ==== SHOW MESSAGE ====
  function showMessage(msg, type = "success") {
    const container = document.querySelector(".aloldal-container");
    const existing = document.querySelector(".login-message");
    if (existing) existing.remove();

    const message = document.createElement("div");
    message.className = `login-message ${type === "error" ? "login-error" : "login-success"}`;
    message.textContent = msg;
    container.prepend(message);
  }

  // ==== REGISZTRÁCIÓ ====
  const form = document.getElementById('register-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const role = document.querySelector('input[name="role"]:checked').value;
    const nev = document.getElementById("reg-username").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const jelszo = document.getElementById("reg-password").value.trim();
    const vegzettseg = document.getElementById("teacher-course").value.trim();

    if (!nev || !email || !jelszo) {
      showMessage("❌ Kérlek, tölts ki minden kötelező mezőt!", "error");
      return;
    }

    if (role === 'teacher' && !vegzettseg) {
      showMessage("❌ Kérlek, add meg a végzettséged!", "error");
      return;
    }

    try {
      const res = await fetch(role === 'user' ? '/api/register-user' : '/api/register-teacher', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          nev, 
          felhasznalonev: nev,
          email, 
          jelszo, 
          vegzettseg, 
        })
      });

      const data = await res.json();
      if (data.success) {
        showMessage("✅ Sikeres regisztráció!", "success");
        form.reset();
        teacherFields.style.display = 'none';
        setTimeout(() => window.location.href = "/bejelentkezes", 1500);
      } else {
        showMessage(data.message || "❌ Hiba a regisztráció során", "error");
      }
    } catch (err) {
      console.error(err);
      showMessage("❌ Szerverhiba", "error");
    }
  });

  // ==== Hide 'Profil' link if user is not logged in ====
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user) {
    document.querySelector('a[href="/profil"]').style.display = 'none';
  }

  // Check if the user is logged in and hide the login/register links
  if (user) {
    const loginNav = document.getElementById('nav-bejelentkezes');
    const registerNav = document.getElementById('nav-regisztracio');
    if (loginNav) loginNav.style.display = 'none';
    if (registerNav) registerNav.style.display = 'none';
  }
</script>
</body>
</html>
