<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanfolyam Feltöltés</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Tanfolyam Feltöltés</h1>
    </header>
    <main>
        <form id="upload-form">
            <label for="course-name">Tanfolyam neve:</label>
            <input type="text" id="course-name" name="course-name" required>

            <label for="course-description">Leírás:</label>
            <textarea id="course-description" name="course-description" required></textarea>

            <label for="course-image">Kép feltöltése:</label>
            <input type="file" id="course-image" name="course-image" accept="image/*" required>

            <button type="submit">Feltöltés</button>
        </form>
    </main>
    <script>
        document.getElementById('upload-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Tanfolyam sikeresen feltöltve!');
        });

        // Check if the user is logged in and hide the login/register links
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            const loginNav = document.getElementById('nav-bejelentkezes');
            const registerNav = document.getElementById('nav-regisztracio');
            if (loginNav) loginNav.style.display = 'none';
            if (registerNav) registerNav.style.display = 'none';
        }
    </script>
</body>
</html>
