<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Üdvözlünk a tanfolyamok oldalán!</h1><img src="Tanfolyamok/kepek/logo.png" alt="Logo" style="position: absolute; top: 10px; left: 10px; width: 100px; height: auto; z-index: 3; cursor: pointer;" onclick="window.location.href='/'">
<!-- ===== FEJLÉC ===== -->
<header id="absztrakt-vonal" style="position: relative; height: 240px;">

    <svg viewBox="0 0 1440 400"
         width="100%" height="220"
         preserveAspectRatio="none"
         style="position:absolute; top:0; left:0; z-index:1; display:block;">
        <defs>
            <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#7b2ff2"/>
                <stop offset="100%" stop-color="#b185f5"/>
            </linearGradient>
            <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#b185f5"/>
                <stop offset="100%" stop-color="#e0c3fc"/>
            </linearGradient>
        </defs>

        <path d="M0,180 C240,120 480,240 720,180 C960,120 1200,240 1440,180 L1440,320 C1200,380 960,100 720,320 C480,540 240,100 0,320 Z"
              fill="url(#wave1)" fill-opacity="0.85"/>

        <path d="M0,210 C360,90 1080,330 1440,210 L1440,350 C1200,400 960,180 720,350 C480,520 240,180 0,350 Z"
              fill="url(#wave2)" fill-opacity="0.65"/>
    </svg>

    <!-- NAV -->
    <nav id="navigacio" style="position:absolute; top:120px; left:0; width:100%; display:flex; justify-content:center; gap:24px; font-size:20px; font-weight:600;">
        <a id="nav-fo" href="/" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Főoldal</a>
        <a id="nav-tanfolyamok" href="/tanfolyamok" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Tanfolyamok</a>
        <a id="nav-bejelentkezes" href="/bejelentkezes" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Bejelentkezés</a>
        <a id="nav-regisztracio" href="/regisztracio" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Regisztráció</a>
        <a id="nav-kapcsolat" href="/kapcsolat" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Kapcsolat</a>
        <a id="nav-profil" href="/profil" style="color:#fff; padding:14px 24px; border-radius:10px; background:rgba(40,40,90,0.5); text-decoration:none; box-shadow: inset 0 0 8px rgba(255,255,255,0.1); transition: 0.2s all;">Profil</a>
    </nav>

</header>

<!-- ===== FŐ TARTALOM ===== -->
<main style="position: relative; z-index: 3; margin-top: 40px;">
    <div class="aloldal-container">
        <h1>Bejelentkezés</h1>

        <form class="auth-form" id="login-form" novalidate>
            <label for="login-username">Felhasznalonev</label>
            <input id="login-username" name="username" type="username" autocomplete="username" required>

            <label for="login-password">Jelszó</label>
            <input id="login-password" name="password" type="password" autocomplete="current-password" required>

            <fieldset style="border:0; padding:0; margin:10px 0;">
                <legend style="font-size:14px;">Szerep (opcionális)</legend>
                <label id="student"><input type="radio" name="role" value="student"> Tanuló</label>
                <label id="Tanar"><input type="radio" name="role" value="teacher"> Oktató</label>
                <label id="Admin"><input type="radio" name="role" value="admin"> Admin</label>
            </fieldset>

            

            <button type="submit">Bejelentkezés</button>
        </form>

        <p style="text-align:center; margin-top:14px;">
            Nincs fiókod? <a href="/regisztracio">Regisztrálj itt!</a>
        </p>
    </div>
</main>

<!-- ===== FOOTER ===== -->
<footer id="footer">
    <div class="footer-container">
        <p>&copy; 2025 MyWebsite. Minden jog fenntartva.</p>
        <nav class="footer-nav">
            <a href="/">Főoldal</a>
            <a href="/tanfolyamok">Tanfolyamok</a>
            <a href="/kapcsolat">Kapcsolat</a>
            <a href="/bejelentkezes">Bejelentkezés</a>
        </nav>
    </div>
</footer>

<script src="/bejelentkezes/login.js"></script>
<script>
    // Avoid redeclaring the 'user' variable
    let user = JSON.parse(localStorage.getItem('user')) || null;
    if (!user) {
        document.querySelector('a[href="/profil"]').style.display = 'none';
    }
</script>
<script>
    // Check if the user is logged in and hide the login/register links
    if (user) {
        const loginNav = document.getElementById('nav-bejelentkezes');
        const registerNav = document.getElementById('nav-regisztracio');
        if (loginNav) loginNav.style.display = 'none';
        if (registerNav) registerNav.style.display = 'none';
    }
</script>
</body>
</html>
