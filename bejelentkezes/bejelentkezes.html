<html lang="hu" data-theme="dark">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

            <path fill="url(#wave-grad)" d="M0,128L48,138.7C96,149,192,171,288,165.3C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>

        <nav id="navigacio">
            <a id="nav-fo" href="/">Főoldal</a>
            <a id="nav-tanfolyamok" href="/tanfolyamok">Tanfolyamok</a>
            <a id="nav-bejelentkezes" href="/bejelentkezes">Bejelentkezés</a>
            <a id="nav-regisztracio" href="/regisztracio">Regisztráció</a>
            <a id="nav-kapcsolat" href="/kapcsolat">Kapcsolat</a>
            <a id="nav-rolunk" href="/rolunk">Rólunk</a>
        </nav>
    </div>
</header>

<!-- ===== FŐ TARTALOM ===== -->
<main class="auth-page">
    <div class="aloldal-container">
        <h1>Üdvözlünk újra!</h1>
        <p class="auth-subtitle">Kérjük, jelentkezz be a folytatáshoz.</p>

        <form class="auth-form" id="login-form" novalidate>
            <div class="input-group">
                <label for="login-username">E-mail cím</label>
                <input id="login-username" name="username" type="email" placeholder="pelda@email.hu" required>
            </div>

            <div class="input-group">
                <label for="login-password">Jelszó</label>
                <input id="login-password" name="password" type="password" placeholder="••••••••" required>
            </div>

            <div class="role-selection">
                <span class="role-title">Szerepkör kiválasztása</span>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="role" value="student" checked>
                        <span class="custom-radio">Tanuló</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="role" value="teacher">
                        <span class="custom-radio">Oktató</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="submit-btn">Bejelentkezés</button>
        </form>

        <p class="auth-footer-text">
            Nincs még fiókod? <a href="/regisztracio">Regisztrálj itt!</a>
        </p>
    </div>
</main>

<footer id="footer">
    <div class="footer-container">
        <p>&copy; 
            BGSZC Pestszentlőrinci Technikum | Mestermunka 2026</p>
            <nav class="footer-nav">
            <a href="/">Főoldal</a>
            <a href="/tanfolyamok">Tanfolyamok</a>
            <a href="/kapcsolat">Kapcsolat</a>
            <a href="/bejelentkezes">Bejelentkezés</a>
        </nav>
    </div>
</footer>

<script src="/bejelentkezes/login.js"></script>
<script>
    // Avoid redeclaring the 'user' variable
    let user = JSON.parse(localStorage.getItem('user')) || null;
    if (!user) {
        document.querySelector('a[href="/profil"]').style.display = 'none';
    }
</script>
<script>
    // Check if the user is logged in and hide the login/register links
    if (user) {
        const loginNav = document.getElementById('nav-bejelentkezes');
        const registerNav = document.getElementById('nav-regisztracio');
        if (loginNav) loginNav.style.display = 'none';
        if (registerNav) registerNav.style.display = 'none';
    }
</script>
</body>
</html>
